{% load static %}
{% load icons %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TributIA - Plataforma inteligente para gestión tributaria con IA">
    <meta name="theme-color" content="#059669">

    <title>{% block title %}TributIA - Gestión Tributaria Inteligente{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <nav class="navbar" role="navigation" aria-label="Navegación principal">
        <a href="{% url 'home' %}" class="logo" aria-current="page">
            <div class="logo-icon">T</div>
            <span class="logo-text">TributIA</span>
        </a>

        <ul class="nav-links">
            <li><a href="{% url 'home' %}" title="Ir a inicio">Inicio</a></li>
            <li><a href="{% url 'login' %}" title="Iniciar sesión">Iniciar Sesión</a></li>
            <li><a href="{% url 'registro' %}" title="Crear nueva cuenta">Crear Cuenta</a></li>
        </ul>
    </nav>

    <main role="main">
        {% block content %}
        {% endblock %}
    </main>

    {% block extra_js %}
    {% endblock %}
</body>
</html>
